<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>면담 예약 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #f5f0e8;
      --accent: #c84b31;
      --accent2: #2d6a4f;
      --muted: #8a8070;
      --line: #d4cfc5;
      --slot-open: #eaf5ef;
      --slot-full: #f5e8e8;
      --slot-mine: #e8f0f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(180,170,155,0.18) 27px,
          rgba(180,170,155,0.18) 28px
        );
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(26,26,46,0.25);
    }
    .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }
    .header-nav a {
      color: rgba(245,240,232,0.6);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--paper); }

    /* ── Main Layout ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }

    /* ── Week Nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .week-nav button {
      background: var(--ink);
      color: var(--paper);
      border: none;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .week-nav button:hover { opacity: 0.75; }
    .week-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
    }
    .week-label strong {
      font-size: 1rem;
      color: var(--ink);
      display: block;
    }

    /* ── Calendar Grid ── */
    .calendar-section {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 2px 20px rgba(26,26,46,0.06);
    }

    .cal-header {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      border-bottom: 2px solid var(--ink);
    }
    .cal-header-cell {
      padding: 0.75rem 0.5rem;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .cal-header-cell.today { color: var(--accent); }
    .cal-header-cell .date-num {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink);
      display: block;
    }
    .cal-header-cell.today .date-num {
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2px;
    }

    .cal-body { overflow-y: auto; max-height: 480px; }

    .cal-row {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      border-bottom: 1px solid var(--line);
    }
    .cal-row:last-child { border-bottom: none; }

    .time-label {
      padding: 0.4rem 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
      background: #faf8f5;
    }

    .slot {
      border-right: 1px solid var(--line);
      min-height: 44px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot:last-child { border-right: none; }
    .slot.open { background: var(--slot-open); }
    .slot.open:hover { background: #d1ead9; }
    .slot.full { background: var(--slot-full); cursor: not-allowed; }
    .slot.mine { background: var(--slot-mine); }
    .slot.closed { background: transparent; cursor: default; }

    .slot-inner {
      font-size: 0.68rem;
      font-weight: 600;
      text-align: center;
      padding: 2px 4px;
      line-height: 1.3;
    }
    .slot.open .slot-inner { color: var(--accent2); }
    .slot.full .slot-inner { color: var(--accent); }
    .slot.mine .slot-inner { color: #2563a8; }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      margin: 1rem;
      box-shadow: 0 24px 64px rgba(26,26,46,0.22);
      overflow: hidden;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      background: var(--ink);
      color: var(--paper);
      padding: 1.25rem 1.5rem;
    }
    .modal-header h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .modal-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: rgba(245,240,232,0.65);
      margin-top: 0.3rem;
    }

    .modal-body { padding: 1.5rem; }

    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: 'Pretendard', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      background: var(--paper);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--ink); background: white; }
    .form-input::placeholder { color: var(--muted); }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      padding: 0 1.5rem 1.5rem;
    }
    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--ink); color: var(--paper); }
    .btn-secondary { background: var(--line); color: var(--muted); }

    /* ── My Reservations ── */
    .my-reservations {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(26,26,46,0.06);
    }
    .section-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-header .badge {
      background: var(--accent);
      color: white;
      border-radius: 99px;
      font-size: 0.7rem;
      padding: 1px 7px;
      font-weight: 700;
    }

    .res-item {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .res-item:last-child { border-bottom: none; }
    .res-info { flex: 1; }
    .res-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent2);
      font-weight: 500;
    }
    .res-name { font-size: 0.9rem; font-weight: 600; margin-top: 1px; }
    .res-meta { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .btn-cancel {
      background: none;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: var(--accent); color: white; }

    .empty-state {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      padding: 0.75rem 1.5rem;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(26,26,46,0.3);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-left: 4px solid var(--accent2); }
    .toast.error { border-left: 4px solid var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .cal-header { grid-template-columns: 56px repeat(7, 1fr); }
      .cal-row { grid-template-columns: 56px repeat(7, 1fr); }
      .time-label { font-size: 0.62rem; padding: 0.4rem 0.4rem; }
      .slot { min-height: 36px; }
      .slot-inner { font-size: 0.58rem; }
      .cal-header-cell { font-size: 0.65rem; padding: 0.5rem 0.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    면담 예약 시스템
  </div>
  <nav class="header-nav">
    <a href="admin/index.html">관리자 →</a>
  </nav>
</header>

<main>
  <h1 class="page-title">면담 예약</h1>
  <p class="page-subtitle">가능한 시간대를 선택하여 면담을 신청하세요. 면담 시간은 30분 단위입니다.</p>

  <!-- Week Navigation -->
  <div class="week-nav">
    <button id="prevWeek">←</button>
    <div class="week-label">
      <strong id="weekRange"></strong>
      <span id="weekSub">주간 일정</span>
    </div>
    <button id="nextWeek">→</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--slot-open);border:1px solid #a8d5b5;"></div>
      예약 가능
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--slot-full);border:1px solid #e8b4a8;"></div>
      예약 완료
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--slot-mine);border:1px solid #a8bdd5;"></div>
      내 예약
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-section">
    <div class="cal-header" id="calHeader"></div>
    <div class="cal-body" id="calBody"></div>
  </div>

  <!-- My Reservations -->
  <div class="my-reservations">
    <div class="section-header">
      내 예약 현황
      <span class="badge" id="myCount">0</span>
    </div>
    <div id="myResList">
      <div class="empty-state">예약 내역이 없습니다.</div>
    </div>
  </div>
</main>

<!-- Booking Modal -->
<div class="modal-backdrop" id="bookModal">
  <div class="modal">
    <div class="modal-header">
      <h2>면담 예약 신청</h2>
      <div class="modal-time" id="modalTime"></div>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" id="inputName" type="text" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label class="form-label">학번</label>
        <input class="form-input" id="inputStudentId" type="text" placeholder="20241234" />
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="inputEmail" type="email" placeholder="example@school.ac.kr" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="confirmBtn">예약 확정</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
